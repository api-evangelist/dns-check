aid: dns-check
name: DNS Check
description: >-
  DNS Check is a domain DNS monitoring service that lets teams monitor, share,
  and troubleshoot DNS records across multiple record types (A, AAAA, CNAME,
  MX, NS, PTR, SOA, SPF, SRV, TXT). The platform detects unresponsive name
  servers, incorrect IP addresses, missing or duplicated records, SPF record
  problems, and out-of-sync name servers, with notifications when records
  change or fail. The DNS Check REST API provides programmatic access to DNS
  record and DNS record group monitoring using a 32-character API key passed
  as a query parameter.
